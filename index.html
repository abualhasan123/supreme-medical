<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساعد قرية الشيخ الطيب</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --user-msg: #2e7d32; --bot-msg: #f0f2f5; --primary: #003366; }
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; background: #f0f2f5; }
        .chat-wrapper { display: flex; flex-direction: column; height: 100vh; max-width: 500px; margin: auto; background: #fff; }
        .chat-header { background: var(--primary); color: white; padding: 15px; text-align: center; }
        .chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 85%; padding: 10px 15px; border-radius: 15px; font-size: 14px; }
        .bot-msg { background: var(--bot-msg); align-self: flex-start; color: #333; }
        .user-msg { background: var(--user-msg); color: white; align-self: flex-end; }
        .input-area { padding: 10px; border-top: 1px solid #eee; }
        input, textarea, select { width: 100%; padding: 10px; margin-bottom: 8px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .send-btn { background: var(--user-msg); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="chat-wrapper">
    <div class="chat-header">
        <strong><i class="fas fa-robot"></i> بوت قرية الشيخ الطيب</strong>
    </div>

    <div class="chat-box" id="chatBox">
        <div class="msg bot-msg">مرحباً بك! أنا نظام الاستقبال الذكي للقرية. ماذا تريد أن تفعل؟</div>
    </div>

    <div class="input-area">
        <form id="tgForm">
            <select id="category" required>
                <option value="معلومات عامة">إضافة معلومات للقرية</option>
                <option value="المكتبة">رفع للمكتبة الإلكترونية</option>
                <option value="شكوى">تقديم شكوى</option>
            </select>
            <input type="text" id="name" placeholder="اسمك الكامل" required>
            <textarea id="message" rows="3" placeholder="اكتب تفاصيلك هنا..." required></textarea>
            <button type="submit" class="send-btn" id="btn">إرسال عبر التليجرام</button>
        </form>
        <div id="status" class="hidden" style="text-align:center; padding:10px; color:green;">تم الإرسال لفرق الدعم بنجاح!</div>
    </div>
</div>

<script>
    const token = "8682180549:AAGxYYy6V5adsST-1M7SrSQqk6EV4gRlM5I";
    const chatId = "5076045934"; // سيصلك تنبيه بالمعلومات هنا

    document.getElementById('tgForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('btn');
        const status = document.getElementById('status');
        
        const text = `🔔 *بلاغ جديد من الموقع* \n\n👤 الاسم: ${document.getElementById('name').value} \n📂 القسم: ${document.getElementById('category').value} \n📝 التفاصيل: ${document.getElementById('message').value}`;

        btn.innerText = "جاري الإرسال...";
        
        fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: chatId, text: text, parse_mode: "Markdown" })
        }).then(res => {
            btn.classList.add('hidden');
            status.classList.remove('hidden');
        });
    });
</script>
</body>
</html>
